<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Розпізнавання гри</title>
<style>
body { font-family: Arial; background:#f2f2f2; padding:20px; }
.container { max-width:1000px; margin:auto; background:white; padding:20px; border-radius:10px; }
h1 { text-align:center; }
label { display:block; margin-top:10px; }
select { width:100%; padding:5px; margin-top:5px; }
button { margin-top:20px; padding:10px 20px; font-size:16px; cursor:pointer; }
.result { margin-top:30px; text-align:center; }
img { max-width:300px; margin-top:15px; }
</style>
</head>
<body>

<div class="container">
<h1>Розпізнавання гри</h1>

<h3>Варіант ваг</h3>
<select id="variant">
  <option value="A">Варіант A (0.5/15 + 0.5/17)</option>
  <option value="B">Варіант B (1/32)</option>
  <option value="C">Варіант C (індивідуальні ваги)</option>
</select>

<div id="features"></div>

<button onclick="recognize()">Розпізнати гру</button>

<div class="result" id="result"></div>
</div>

<script>
// ===== ІГРИ =====
const games = [
    { name: "Counter-Strike: Global Offensive", img: "images/cs.jpg" },
  { name: "The Witcher 3: Wild Hunt", img: "images/witcher.jpg" },
  { name: "Age of Empires IV", img: "images/aoe.jpg" },
  { name: "Silent Hill 2", img: "images/sh.jpg" }
];

// ===== 32 ОЗНАКИ =====
const features = [
["Жанр",["Шутер","RPG","Стратегія","Survival-horror"]],
["Тип перспективи",["Від першої особи","Від третьої особи","Ізометрична","Вільна камера"]],
["Режим гри",["Командний","Одиночний","Масовий","Кооперативний"]],
["Тип світу",["Реалістичний","Фентезійний","Історичний","Психологічний"]],
["Основна мета",["Знищення суперника","Проходження сюжету","Розвиток держави","Виживання"]],
["Наявність сюжету",["Мінімальний","Нелінійний","Лінійний","Гілкувальний"]],
["Масштаб подій",["Локальний","Регіональний","Глобальний","Симуляційний"]],
["Темп гри",["Динамічний","Помірний","Повільний","Ритмічний"]],
["Рівень складності",["Середній","Високий","Експертний","Легкий"]],
["Тип конфлікту",["Командний","Особистий","Міждержавний","Внутрішній психологічний"]],
["Атмосфера",["Змагальна","Пригодницька","Історична","Тривожна"]],
["Роль гравця",["Солдат","Найманець","Правитель","Дослідник"]],
["Ступінь свободи",["Обмежена","Відкрита","Часткова","Sandbox"]],
["Рівень реалізму",["Реалістичний","Напівреалістичний","Стилізований","Реалістичний"]],
["Тип прогресу",["Через спорядження","Через навички","Через розвиток структури","Через сюжет"]],
["Тип бойової системи",["Тактична стрільба","Комбінований бій","Масове управління військами","Обмежений контакт"]],
["Тип суперників",["Реальні гравці","Монстри","Історичні армії","Символічні образи"]],
["Тип ресурсів",["Фінансові","Магічні","Матеріальні","Психологічні"]],
["Економічна модель",["Тактичний","Внутрішньоігровий","Розгалужена стратегічна","Відсутня"]],
["Тип локацій",["Закриті карти","Відкритий світ","Історичні території","Замкнуті простори"]],
["Моральний вибір",["Відсутній","Впливає на сюжет","Обмежений","Важливий"]],
["Тип розвитку персонажа",["Покращення спорядження","Система навичок","Без розвитку","Сюжетна трансформація"]],
["Формат протистояння",["Раунди","Відкритий конфлікт","Кампанія","Психологічне протистояння"]],
["Основний рушій",["Змагання","Пророцтво","Історичний розвиток","Травматична подія"]],
["Командна взаємодія",["Координація ролей","Тактична підтримка","Управління армією","Індивідуальне виживання"]],
["Рівень напруги",["Середній","Високий","Напружений","Критичний"]],
["Тип середовища",["Міські карти","Природний світ","Середньовічні ландшафти","Покинуте місто"]],
["Структура гри",["Раундова","Квестова","Кампанійна","Епізодична"]],
["Тип загрози",["Збройний супротивник","Політичні сили","Військова експансія","Внутрішні страхи"]],
["Тип фіналу",["Перемога команди","Варіативне завершення","Історична домінація","Психологічне усвідомлення"]],
["Рівень стратегічного планування",["Тактичний","Тактичний","Глобальний","Мінімальний"]],
["Характер геймплею",["Змагальний","Рольовий","Стратегічний","Психологічний"]]
];
// ===== ВАГИ =====
const weights = {
  A_common: 0.5 / 15,
  A_specific: 0.5 / 17,
  B: 1 / 32,
  C: [
    0.05,0.03,0.03,0.05,0.05,0.03,0.03,0.02,0.02,0.05,
    0.02,0.03,0.02,0.02,0.05,
    0.045,0.045,0.01,0.015,0.03,0.03,0.016,0.03,0.03,
    0.03,0.016,0.03,0.03,0.045,0.01,0.044,0.044
  ]
};

// ===== ПЕРЕМІШУВАННЯ =====
function shuffle(array){ return array.sort(()=>Math.random()-0.5); }

const container=document.getElementById("features");

features.forEach((f,i)=>{
  let options=f[1].map((text,gameIndex)=>({ text:text, game:gameIndex }));
  options=shuffle(options);

  let html=`<label>${f[0]}
    <select data-index="${i}">
    <option value="">-- оберіть --</option>`;

  options.forEach(opt=> html+=`<option value="${opt.game}">${opt.text}</option>`);

  html+="</select></label>";
  container.innerHTML+=html;
});

// ===== РОЗПІЗНАВАННЯ =====
function recognize(){
  let scores=[0,0,0,0];
  const variant=document.getElementById("variant").value;
  const selects=document.querySelectorAll("select[data-index]");

  selects.forEach(sel=>{
    if(sel.value==="") return;

    const featureIndex=parseInt(sel.dataset.index);
    const selectedGame=parseInt(sel.value);

    let weight=0;
    if(variant==="A"){ weight = (featureIndex<=14)? weights.A_common : weights.A_specific; }
    if(variant==="B"){ weight = weights.B; }
    if(variant==="C"){ weight = weights.C[featureIndex]; }

    scores[selectedGame]+=weight;
  });

  const maxIndex=scores.indexOf(Math.max(...scores));

  document.getElementById("result").innerHTML=`
    <h2>Визначено гру:</h2>
    <h3>${games[maxIndex].name}</h3>
    <img src="${games[maxIndex].img}">
  `;

  // ===== Скидаємо відповіді =====
  selects.forEach(sel=> sel.value="");
}

</script>
</body>

</html>
